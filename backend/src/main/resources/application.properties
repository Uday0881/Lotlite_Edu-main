# ============================================================
# Lotlite Spring Boot — Application Properties
# Edit the values below to configure your deployment
# ============================================================

# Server
server.port=8080

# ---- MongoDB Configuration ----
# Local dev: use MongoDB Community on localhost
# Cloud: replace with your MongoDB Atlas connection string
spring.data.mongodb.uri=mongodb://localhost:27017/lotlite
# spring.data.mongodb.uri=mongodb+srv://username:password@cluster.mongodb.net/lotlite?retryWrites=true&w=majority

spring.data.mongodb.database=lotlite

# ---- Google Sheets Webhook ----
# Paste your Apps Script web app deployment URL here.
# Leave blank to disable Sheets forwarding.
lotlite.sheets.webhook-url= https://script.google.com/macros/s/AKfycbxKjfg78cxZeQIvy50_Z9xlgtbfQXKbg6jm0GI73nTeeGTw3LrbC3bzo0qjjZtY3ufG/exec

# ---- CORS ----
# Additional origins can be configured in WebConfig.java

# ---- Logging ----
logging.level.in.lotlite=INFO
logging.level.org.springframework.data.mongodb=WARN

# ---- Jackson (JSON) ----
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.serialization.write-dates-as-timestamps=false
